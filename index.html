<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERON LUMBRE — Visual Artist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050505;
  --platinum: #D9D9D9;
  --cold-white: #F5F8FF;
  --electric: #6A5BFF;
  --electric-dim: rgba(106,91,255,0.15);
  --font-title: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'Space Mono', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--platinum); font-family: var(--font-body); overflow-x: hidden; cursor: none; }

/* CURSOR */
#cursor { width:12px; height:12px; background:var(--electric); border-radius:50%; position:fixed; top:0; left:0; pointer-events:none; z-index:9999; transition:transform 0.1s; mix-blend-mode:screen; }
#cursor-trail { width:36px; height:36px; border:1px solid rgba(106,91,255,0.5); border-radius:50%; position:fixed; top:0; left:0; pointer-events:none; z-index:9998; transition:transform 0.35s cubic-bezier(0.23,1,0.32,1); }

/* CANVAS */
#bg-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

/* NAVBAR */
nav { position:fixed; top:0; left:0; right:0; z-index:1000; padding:20px 48px; display:flex; align-items:center; justify-content:space-between; backdrop-filter:blur(20px) saturate(180%); background:rgba(5,5,5,0.6); border-bottom:1px solid rgba(217,217,217,0.05); transition:all 0.4s; }
nav.scrolled { padding:14px 48px; background:rgba(5,5,5,0.92); }
.nav-logo { font-family:var(--font-title); font-weight:800; font-size:1.1rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--cold-white); text-decoration:none; }
.nav-links { display:flex; gap:36px; list-style:none; }
.nav-links a { font-family:var(--font-mono); font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(217,217,217,0.45); text-decoration:none; transition:color 0.3s; position:relative; }
.nav-links a::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:1px; background:var(--electric); transition:width 0.3s; }
.nav-links a:hover { color:var(--cold-white); }
.nav-links a:hover::after { width:100%; }
.nav-cta { font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--electric); border:1px solid var(--electric); padding:8px 20px; text-decoration:none; transition:all 0.3s; }
.nav-cta:hover { background:var(--electric); color:var(--black); }

/* HERO */
#hero { position:relative; z-index:1; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; overflow:hidden; }
.hero-eyebrow { font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.4em; text-transform:uppercase; color:var(--electric); margin-bottom:28px; opacity:0; animation:fadeUp 0.8s 0.3s forwards; }
.hero-title { font-family:var(--font-title); font-weight:800; font-size:clamp(4rem,12vw,11rem); line-height:0.9; letter-spacing:-0.03em; text-transform:uppercase; opacity:0; animation:fadeUp 0.9s 0.5s forwards; }
.hero-title span { display:block; background:linear-gradient(135deg,#fff 0%,var(--platinum) 40%,var(--electric) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.hero-subtitle { font-family:var(--font-mono); font-size:clamp(0.55rem,1.2vw,0.75rem); letter-spacing:0.3em; text-transform:uppercase; color:rgba(217,217,217,0.4); margin-top:28px; opacity:0; animation:fadeUp 0.9s 0.75s forwards; }
.hero-tagline { font-family:var(--font-body); font-weight:300; font-size:clamp(0.85rem,1.6vw,1.1rem); color:rgba(217,217,217,0.5); margin-top:16px; font-style:italic; opacity:0; animation:fadeUp 0.9s 0.95s forwards; }
.hero-cta { margin-top:52px; opacity:0; animation:fadeUp 0.9s 1.2s forwards; }
.btn-primary { display:inline-block; font-family:var(--font-mono); font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--black); background:var(--cold-white); padding:18px 44px; text-decoration:none; position:relative; overflow:hidden; transition:all 0.4s; }
.btn-primary::before { content:''; position:absolute; inset:0; background:var(--electric); transform:translateX(-100%); transition:transform 0.4s cubic-bezier(0.23,1,0.32,1); }
.btn-primary:hover::before { transform:translateX(0); }
.btn-primary:hover { color:var(--cold-white); }
.btn-primary span { position:relative; z-index:1; }
.hero-rings { position:absolute; width:600px; height:600px; left:50%; top:50%; transform:translate(-50%,-50%); pointer-events:none; }
.ring { position:absolute; border-radius:50%; border:1px solid rgba(106,91,255,0.1); top:50%; left:50%; transform:translate(-50%,-50%); animation:rotateRing linear infinite; }
.ring:nth-child(1) { width:300px; height:300px; animation-duration:20s; border-color:rgba(106,91,255,0.2); }
.ring:nth-child(2) { width:450px; height:450px; animation-duration:35s; animation-direction:reverse; border-style:dashed; }
.ring:nth-child(3) { width:600px; height:600px; animation-duration:50s; }
.hero-scroll { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:8px; opacity:0; animation:fadeUp 1s 1.6s forwards; }
.hero-scroll span { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.3em; text-transform:uppercase; color:rgba(217,217,217,0.25); }
.scroll-line { width:1px; height:60px; background:linear-gradient(to bottom,rgba(106,91,255,0.7),transparent); animation:scrollPulse 2s infinite; }

/* SECTIONS */
section { position:relative; z-index:1; padding:120px 48px; }
.section-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:64px; border-bottom:1px solid rgba(217,217,217,0.07); padding-bottom:24px; }
.section-label { font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--electric); display:block; margin-bottom:10px; }
.section-title { font-family:var(--font-title); font-weight:800; font-size:clamp(2.5rem,6vw,5rem); text-transform:uppercase; line-height:0.9; letter-spacing:-0.02em; color:var(--cold-white); }
.section-count { font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.2em; color:rgba(217,217,217,0.2); }

/* FILTERS */
.filter-bar { display:flex; gap:4px; margin-bottom:48px; flex-wrap:wrap; }
.filter-btn { font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; padding:10px 20px; background:transparent; border:1px solid rgba(217,217,217,0.08); color:rgba(217,217,217,0.35); cursor:none; transition:all 0.3s; }
.filter-btn:hover, .filter-btn.active { border-color:var(--electric); color:var(--cold-white); background:var(--electric-dim); }

/* MASONRY — sin recorte, proporciones reales */
.masonry-grid { columns:3; column-gap:14px; }
@media(max-width:1100px){ .masonry-grid { columns:2; } }
@media(max-width:540px){ .masonry-grid { columns:1; } }

.artwork-card { break-inside:avoid; margin-bottom:14px; position:relative; overflow:hidden; background:#0a0a0a; cursor:none; border:1px solid rgba(217,217,217,0.04); transition:border-color 0.4s; display:block; }
.artwork-card:hover { border-color:rgba(106,91,255,0.35); }
.artwork-img { width:100%; height:auto; display:block; transition:filter 0.5s, transform 0.6s cubic-bezier(0.23,1,0.32,1); filter:brightness(0.88) saturate(0.9); }
.artwork-card:hover .artwork-img { filter:brightness(1) saturate(1.1); transform:scale(1.02); }
.artwork-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(5,5,5,0.9) 0%,transparent 100%); padding:20px 18px 16px; opacity:0; transition:opacity 0.35s; pointer-events:none; }
.artwork-card:hover .artwork-overlay { opacity:1; }
.artwork-cat { font-family:var(--font-mono); font-size:0.48rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--electric); }
.artwork-glow { position:absolute; inset:0; box-shadow:inset 0 0 50px rgba(106,91,255,0); transition:box-shadow 0.4s; pointer-events:none; }
.artwork-card:hover .artwork-glow { box-shadow:inset 0 0 50px rgba(106,91,255,0.1); }

.empty-state { padding:100px 40px; text-align:center; color:rgba(217,217,217,0.1); font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; border:1px dashed rgba(217,217,217,0.05); }
.empty-icon { font-size:2.5rem; margin-bottom:20px; opacity:0.25; }

/* ABOUT */
.about-grid { display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; }
.about-text p { font-size:1.05rem; line-height:1.85; color:rgba(217,217,217,0.6); margin-bottom:20px; font-weight:300; }
.about-text p strong { color:var(--cold-white); font-weight:500; }
.skills-grid { margin-top:48px; display:grid; grid-template-columns:1fr 1fr; gap:32px; }
.skill-group h4 { font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--electric); margin-bottom:14px; }
.skill-item { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.skill-bar-wrap { flex:1; height:1px; background:rgba(217,217,217,0.1); overflow:hidden; }
.skill-bar { height:100%; background:linear-gradient(to right,var(--electric),rgba(106,91,255,0.3)); width:0; transition:width 1.5s cubic-bezier(0.23,1,0.32,1); }
.skill-name { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.1em; color:rgba(217,217,217,0.45); min-width:100px; }
.about-visual { position:relative; }
.about-img-wrap { aspect-ratio:3/4; overflow:hidden; border:1px solid rgba(217,217,217,0.07); background:#0d0d0d; display:flex; align-items:center; justify-content:center; }
.about-img-wrap img { width:100%; height:100%; object-fit:cover; filter:saturate(0.7) brightness(0.8); }
.about-placeholder { display:flex; flex-direction:column; align-items:center; gap:12px; color:rgba(217,217,217,0.1); font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; }
.about-img-frame { position:absolute; inset:-1px; border:1px solid rgba(106,91,255,0.25); pointer-events:none; }
.about-img-frame::before, .about-img-frame::after { content:''; position:absolute; width:20px; height:20px; border-color:var(--electric); border-style:solid; }
.about-img-frame::before { top:-1px; left:-1px; border-width:2px 0 0 2px; }
.about-img-frame::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }
.about-stats { position:absolute; bottom:-24px; right:-24px; background:rgba(5,5,5,0.92); border:1px solid rgba(106,91,255,0.18); padding:24px 28px; backdrop-filter:blur(20px); }
.stat-num { font-family:var(--font-title); font-weight:800; font-size:2.2rem; color:var(--cold-white); line-height:1; }
.stat-label { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.25em; text-transform:uppercase; color:rgba(217,217,217,0.35); margin-top:4px; }

/* CONTACT */
#contact { max-width:780px; margin:0 auto; text-align:center; }
.contact-headline { font-family:var(--font-title); font-weight:800; font-size:clamp(3rem,8vw,7rem); text-transform:uppercase; line-height:0.9; letter-spacing:-0.03em; color:var(--cold-white); margin-bottom:20px; }
.contact-sub { font-family:var(--font-body); font-size:1rem; color:rgba(217,217,217,0.4); font-style:italic; margin-bottom:52px; }
.contact-email-block { display:inline-flex; flex-direction:column; align-items:center; gap:14px; border:1px solid rgba(106,91,255,0.2); padding:44px 68px; margin-bottom:48px; background:rgba(106,91,255,0.03); transition:border-color 0.3s; }
.contact-email-block:hover { border-color:rgba(106,91,255,0.4); }
.contact-email-label { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--electric); }
.contact-email-addr { font-family:var(--font-title); font-weight:700; font-size:clamp(1rem,2.5vw,1.5rem); color:var(--cold-white); text-decoration:none; letter-spacing:-0.01em; transition:color 0.3s; }
.contact-email-addr:hover { color:var(--electric); }
.contact-email-note { font-family:var(--font-mono); font-size:0.48rem; letter-spacing:0.2em; color:rgba(217,217,217,0.22); }
.contact-socials { display:flex; gap:32px; justify-content:center; flex-wrap:wrap; }
.social-link { font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(217,217,217,0.28); text-decoration:none; transition:color 0.3s; }
.social-link:hover { color:var(--electric); }

/* FOOTER */
footer { position:relative; z-index:1; padding:36px 48px; border-top:1px solid rgba(217,217,217,0.05); display:flex; align-items:center; justify-content:space-between; }
.footer-logo { font-family:var(--font-title); font-weight:800; font-size:0.9rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(217,217,217,0.22); }
.footer-signal { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.2em; color:rgba(217,217,217,0.12); font-style:italic; }
.footer-copy { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.15em; color:rgba(217,217,217,0.1); }

/* LIGHTBOX */
#lightbox { position:fixed; inset:0; z-index:5000; background:rgba(5,5,5,0.97); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.4s; backdrop-filter:blur(24px); }
#lightbox.open { opacity:1; pointer-events:all; }
#lightbox-img { max-width:88vw; max-height:88vh; object-fit:contain; border:1px solid rgba(106,91,255,0.15); box-shadow:0 0 80px rgba(106,91,255,0.08); }
#lightbox-close { position:absolute; top:32px; right:40px; font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:rgba(217,217,217,0.35); cursor:none; background:none; border:none; transition:color 0.3s; }
#lightbox-close:hover { color:var(--electric); }
#lightbox-cat { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--electric); }

/* ─── AUTH MODAL ─── */
#auth-modal { position:fixed; inset:0; z-index:6000; background:rgba(5,5,5,0.97); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(30px); }
#auth-modal.open { opacity:1; pointer-events:all; }
.auth-box { width:360px; border:1px solid rgba(106,91,255,0.2); background:rgba(8,8,8,0.99); padding:44px; display:flex; flex-direction:column; gap:16px; }
.auth-title { font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--electric); margin-bottom:4px; }
.auth-desc { font-family:var(--font-mono); font-size:0.48rem; letter-spacing:0.15em; color:rgba(217,217,217,0.22); }
.auth-input { width:100%; background:rgba(255,255,255,0.03); border:1px solid rgba(217,217,217,0.1); padding:14px; color:var(--cold-white); font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.15em; outline:none; transition:border-color 0.3s; cursor:none; }
.auth-input:focus { border-color:var(--electric); }
.auth-btn { width:100%; padding:14px; background:var(--electric); border:none; color:var(--black); font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; cursor:none; transition:opacity 0.3s; }
.auth-btn:hover { opacity:0.85; }
.auth-cancel { background:none; border:none; font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(217,217,217,0.2); cursor:none; transition:color 0.3s; text-align:center; }
.auth-cancel:hover { color:rgba(217,217,217,0.5); }
.auth-error { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.15em; color:#ff5050; text-align:center; min-height:16px; }

/* ─── ADMIN PANEL ─── */
#admin-panel { position:fixed; top:0; right:0; bottom:0; width:360px; z-index:5500; background:rgba(6,6,6,0.99); border-left:1px solid rgba(106,91,255,0.2); backdrop-filter:blur(30px); transform:translateX(100%); transition:transform 0.4s cubic-bezier(0.23,1,0.32,1); display:flex; flex-direction:column; overflow:hidden; }
#admin-panel.open { transform:translateX(0); }
.admin-top { padding:28px 24px 20px; border-bottom:1px solid rgba(217,217,217,0.05); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.admin-title { font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--electric); }
.admin-close { background:none; border:none; color:rgba(217,217,217,0.3); cursor:none; font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; transition:color 0.3s; }
.admin-close:hover { color:var(--cold-white); }
.admin-scroll { flex:1; overflow-y:auto; padding:24px; scrollbar-width:thin; scrollbar-color:rgba(106,91,255,0.2) transparent; }
.admin-block { margin-bottom:28px; }
.admin-block-label { font-family:var(--font-mono); font-size:0.48rem; letter-spacing:0.3em; text-transform:uppercase; color:rgba(217,217,217,0.28); margin-bottom:12px; display:block; }
.drop-zone { border:1px dashed rgba(106,91,255,0.25); padding:28px 16px; text-align:center; cursor:none; transition:all 0.3s; }
.drop-zone.drag-over { border-color:var(--electric); background:var(--electric-dim); }
.drop-zone p { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.12em; color:rgba(217,217,217,0.32); line-height:1.9; }
.drop-zone strong { color:var(--electric); }
#file-input { display:none; }
.upload-previews { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.up-thumb { width:54px; height:54px; object-fit:cover; border:1px solid rgba(106,91,255,0.2); }
.a-input { width:100%; background:rgba(255,255,255,0.03); border:1px solid rgba(217,217,217,0.08); padding:10px 12px; color:var(--cold-white); font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.08em; outline:none; transition:border-color 0.3s; margin-bottom:8px; cursor:none; }
.a-input:focus { border-color:var(--electric); }
.a-select { width:100%; background:#0a0a0a; border:1px solid rgba(217,217,217,0.08); padding:10px 12px; color:var(--cold-white); font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.08em; outline:none; margin-bottom:8px; cursor:none; appearance:none; }
.a-select option { background:#0d0d0d; }
.a-btn { width:100%; padding:12px; border:none; background:var(--electric); color:var(--black); font-family:var(--font-mono); font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; cursor:none; transition:opacity 0.3s; margin-bottom:6px; }
.a-btn:hover { opacity:0.85; }
.a-btn.ghost { background:transparent; border:1px solid rgba(255,80,80,0.2); color:rgba(255,80,80,0.45); }
.a-btn.ghost:hover { border-color:#ff5050; color:#ff5050; }
.manage-list { max-height:280px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:rgba(106,91,255,0.15) transparent; }
.m-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(217,217,217,0.04); }
.m-thumb { width:40px; height:40px; object-fit:cover; border:1px solid rgba(217,217,217,0.06); flex-shrink:0; }
.m-info { flex:1; min-width:0; }
.m-name { font-family:var(--font-mono); font-size:0.48rem; letter-spacing:0.08em; color:rgba(217,217,217,0.5); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.m-cat  { font-family:var(--font-mono); font-size:0.44rem; letter-spacing:0.15em; color:var(--electric); text-transform:uppercase; margin-top:2px; }
.m-del  { background:none; border:none; color:rgba(255,80,80,0.3); cursor:none; font-size:0.75rem; padding:4px; transition:color 0.2s; flex-shrink:0; }
.m-del:hover { color:#ff5050; }
.status-msg { font-family:var(--font-mono); font-size:0.5rem; letter-spacing:0.15em; padding:10px 0; text-align:center; min-height:32px; }
.status-msg.ok  { color:#50ff8c; }
.status-msg.err { color:#ff5050; }

/* ADMIN TRIGGER — esquina abajo derecha, muy discreto */
#admin-trigger { position:fixed; bottom:24px; right:24px; z-index:4000; width:40px; height:40px; background:transparent; border:1px solid rgba(217,217,217,0.04); display:flex; align-items:center; justify-content:center; cursor:none; transition:all 0.4s; opacity:0.2; }
#admin-trigger:hover { opacity:0.8; border-color:rgba(106,91,255,0.3); }

/* REVEAL */
.reveal { opacity:0; transform:translateY(32px); transition:opacity 0.8s ease, transform 0.8s cubic-bezier(0.23,1,0.32,1); }
.reveal.visible { opacity:1; transform:translateY(0); }

/* ANIMATIONS */
@keyframes fadeUp { from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)} }
@keyframes rotateRing { from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)} }
@keyframes scrollPulse { 0%,100%{opacity:.3}50%{opacity:.8} }
@keyframes glitch { 0%,100%{transform:none}7%{transform:skew(-.5deg,-.9deg)}10%{transform:none}30%{transform:skew(.8deg,-.1deg)}35%{transform:none} }
.glitch { animation:glitch 4s infinite; }

/* MOBILE */
@media(max-width:900px){
  nav { padding:16px 24px; }
  .nav-links { display:none; }
  section { padding:80px 24px; }
  .about-grid { grid-template-columns:1fr; }
  .about-visual { order:-1; }
  .about-stats { position:static; margin-top:20px; }
  footer { flex-direction:column; gap:12px; text-align:center; }
  #admin-panel { width:100%; }
  .contact-email-block { padding:32px 24px; width:100%; }
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>
<canvas id="bg-canvas"></canvas>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close">[ close ]</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-cat"></div>
</div>

<!-- AUTH MODAL -->
<div id="auth-modal">
  <div class="auth-box">
    <div class="auth-title">// Admin Access</div>
    <div class="auth-desc">Contraseña para gestionar el archivo</div>
    <input type="password" class="auth-input" id="auth-input" placeholder="••••••••••">
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" id="auth-submit">Acceder</button>
    <button class="auth-cancel" id="auth-cancel">Cancelar</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-top">
    <span class="admin-title">// Gallery Manager</span>
    <button class="admin-close" id="admin-close">cerrar ×</button>
  </div>
  <div class="admin-scroll">

    <!-- Configuración de GitHub (solo visible para admin) -->
    <div class="admin-block" id="github-config-block">
      <span class="admin-block-label">GitHub Config (para persistencia)</span>
      <input type="text" class="a-input" id="github-token" placeholder="GitHub Personal Access Token" autocomplete="off">
      <input type="text" class="a-input" id="github-repo" placeholder="usuario/repo (ej: eronlumbre/portfolio)" autocomplete="off">
      <input type="text" class="a-input" id="github-path" placeholder="ruta/archivo.json (ej: data/gallery.json)" autocomplete="off" value="gallery_data.json">
      <button class="a-btn" id="save-github-config">Guardar Configuración</button>
      <div class="status-msg" id="github-status"></div>
    </div>

    <div class="admin-block">
      <span class="admin-block-label">Subir imágenes</span>
      <div class="drop-zone" id="drop-zone">
        <p>Arrastra aquí o <strong>haz click</strong><br>PNG · JPG · WEBP — varias a la vez</p>
        <input type="file" id="file-input" accept="image/*" multiple>
      </div>
      <div class="upload-previews" id="upload-previews"></div>
    </div>

    <div id="upload-fields" style="display:none;" class="admin-block">
      <span class="admin-block-label">Detalles</span>
      <input type="text" class="a-input" id="a-title" placeholder="Título de la obra">
      <select class="a-select" id="a-cat">
        <option value="Illustration">Illustration</option>
        <option value="Concept Art">Concept Art</option>
